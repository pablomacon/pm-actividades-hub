<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Programación Avanzada | Actividades</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="header-container">
        <img src="/assets/LogoProfeMacon.jpg" class="main-logo" />
        <div class="title-block">
          <h1>Programación Avanzada</h1>
          <p>Tus actividades</p>
        </div>
      </div>
    </header>

    <main>
      <div id="loginBox" class="card">
        <h3>Acceso</h3>
        <p>Iniciá sesión para ver tus actividades.</p>
        <button id="loginBtn" class="btn">Ingresar con Google</button>
      </div>

      <section
        id="actividadesContainer"
        class="grid"
        style="display: none"
      ></section>
    </main>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
  </body>
</html>
