<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Programación Avanzada | Actividades</title>
    <link rel="stylesheet" href="../../styles.css" />
  </head>

  <body>
    <header class="site-header" id="siteHeader">
      <div class="header-container">
        <a href="../../" class="logo-link">
          <img src="../../assets/LogoProfeMacon.jpg" class="main-logo" />
        </a>

        <div class="title-block">
          <h1>Programación Avanzada</h1>
          <p>Tus actividades</p>
        </div>

        <nav class="main-nav">
          <a href="../../">← Hub general</a>

          <button id="logoutBtn" class="logout-btn" type="button">
            Cerrar sesión
          </button>
        </nav>
      </div>
    </header>

    <main>
      <section class="security-notice">
        <strong>Importante:</strong>
        si estás usando una computadora compartida, al terminar presioná
        <strong>“Cerrar sesión”</strong>. También verificá que tu cuenta de
        Google no quede abierta en el navegador.
      </section>
      <div id="loginBox" class="card">
        <h3>Acceso</h3>
        <p>Iniciá sesión para ver tus actividades.</p>

        <div id="googleButton"></div>
        <p id="loginStatus" class="login-status"></p>
      </div>

      <section
        id="actividadesContainer"
        class="grid"
        style="display: none"
      ></section>
    </main>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="../../shared/config.js"></script>
    <script src="config.js"></script>
    <script src="../../shared/auth.js"></script>
    <script src="app.js"></script>
    <script src="../../header.js"></script>
  </body>
</html>
